name: Desktop ISO
on:
  push:
    branches:
    - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged
    name: Build
    outputs:
      builddate: ${{ steps.date.outputs.builddate }}
    steps:
      - name: Get build date
        id: date
        run: |
          echo "builddate=$(date +'%y%m%d')" >> $GITHUB_OUTPUT

      - name: Clone CachyOS-Live-ISO
        id: clone
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add CachyOS keyring
        id: keyring
        run: |
          pacman-key --init
          pacman-key --recv-keys F3B607488DB35A47 --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key F3B607488DB35A47

          sed -i '/^\[core\]$/i[cachyos]\nServer = https://mirror.cachyos.org/repo/$arch/$repo\n' /etc/pacman.conf

      - name: Install dependencies
        id: dependencies
        run: |
          sudo pacman -Syu --noconfirm archiso cachyos-keyring mkinitcpio-archiso squashfs-tools grub

      - name: Create build user
        id: user-archiso
        run: |
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chmod -R a+rw .

      - name: Build ISO (${{ steps.date.outputs.builddate }})
        id: build
        run: |
          sudo -H -E -u builder ./buildiso.sh

      - name: Upload ISO to artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-desktop-linux-${{ steps.date.outputs.builddate }}
          path: out/desktop/*
